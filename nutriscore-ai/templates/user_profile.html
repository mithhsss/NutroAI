<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - NutriScore AI</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-decoration-none" href="{{ url_for('index') }}">🍎 NutriScore AI</a>
            <div class="d-flex align-items-center">
                <a href="{{ url_for('dashboard') }}" class="btn btn-outline-light btn-sm me-3">Back to Dashboard</a>
                <button id="logoutBtn" class="btn btn-outline-light btn-sm">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5 pb-5">
        <div class="row justify-content-center">
            
            <!-- User Info Card -->
            <div class="col-lg-4 mb-4">
                <div class="card border-0 shadow-sm rounded-4 text-center p-4">
                    <img id="profileAvatar" src="" alt="User Avatar" class="rounded-circle mx-auto mb-3 shadow" width="120" height="120">
                    <h4 class="fw-bold mb-1" id="profileNameDisplay">User</h4>
                    <p class="text-muted small" id="profileEmailDisplay">user@example.com</p>
                    <hr>
                    <div class="row text-start mt-3">
                        <div class="col-6 mb-2">
                            <small class="text-muted fw-bold d-block">Goal</small>
                            <span id="profileGoal" class="small">-</span>
                        </div>
                        <div class="col-6 mb-2">
                            <small class="text-muted fw-bold d-block">Diet</small>
                            <span id="profileDiet" class="small">-</span>
                        </div>
                        <div class="col-6 mb-2">
                            <small class="text-muted fw-bold d-block">Activity</small>
                            <span id="profileActivity" class="small">-</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Chart Card -->
            <div class="col-lg-8 mb-4">
                <div class="card border-0 shadow-sm rounded-4 p-4 h-100">
                    <h5 class="fw-bold mb-4">Your Health Score (Last 7 Days)</h5>
                    <div style="position: relative; height:300px; width:100%">
                        <canvas id="weeklyScoreChart"></canvas>
                    </div>
                    <p class="text-muted small text-center mt-3">This chart reflects the daily average score of all foods you've logged.</p>
                </div>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const userId = localStorage.getItem('userId');
        if (!userId) {
            window.location.href = "{{ url_for('login') }}";
        }

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('userId');
            window.location.href = "{{ url_for('index') }}";
        });

        async function loadProfileData() {
            try {
                // Fetch user metadata first (re-using the dashboard endpoint for basic info)
                const dashRes = await fetch(`/api/dashboard/${userId}`);
                if (!dashRes.ok) throw new Error('Failed to load user info');
                const dashData = await dashRes.json();

                if (dashData.user) {
                    document.getElementById('profileNameDisplay').textContent = dashData.user.name;
                    document.getElementById('profileEmailDisplay').textContent = dashData.user.email;
                    document.getElementById('profileAvatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(dashData.user.name)}&background=ffffff&color=198754&bold=true&size=120`;
                }
                if (dashData.profile) {
                    document.getElementById('profileGoal').textContent = dashData.profile.fitness_goal || '-';
                    document.getElementById('profileDiet').textContent = dashData.profile.diet_preference || '-';
                    document.getElementById('profileActivity').textContent = dashData.profile.activity_level || '-';
                }

                // Fetch Chart Data
                const statsRes = await fetch(`/api/stats/${userId}`);
                if (!statsRes.ok) throw new Error('Failed to load stats');
                const statsData = await statsRes.json();
                
                renderChart(statsData.labels, statsData.scores);

            } catch (err) {
                console.error(err);
                alert("Session expired or server error. Please login again.");
                localStorage.removeItem('userId');
                window.location.href = "{{ url_for('login') }}";
            }
        }

        function renderChart(labels, scores) {
            const ctx = document.getElementById('weeklyScoreChart').getContext('2d');
            
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Avg Daily Health Score',
                        data: scores,
                        borderColor: '#198754', // Bootstrap success color
                        backgroundColor: 'rgba(25, 135, 84, 0.2)',
                        borderWidth: 3,
                        pointBackgroundColor: '#198754',
                        pointRadius: 5,
                        pointHoverRadius: 7,
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            title: {
                                display: true,
                                text: 'Score'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: 'Date'
                            }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        // Trigger load
        loadProfileData();
    </script>
</body>
</html>
