<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - NutriScore AI</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">🍎 NutriScore AI</a>
        </div>
    </nav>

    <!-- Sign Up Form Content -->
    <div class="container mt-5 pt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card border-0 shadow-sm rounded-4 p-4">
                    <h2 class="text-center mb-4 pt-2 fw-bold text-success">Create Account</h2>
                    <form id="signupForm">
                        <div class="mb-3">
                            <label for="name" class="form-label text-muted fw-semibold">Full Name</label>
                            <input type="text" class="form-control" id="name" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label text-muted fw-semibold">Email address</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label text-muted fw-semibold">Password</label>
                            <input type="password" class="form-control" id="password" required minlength="6">
                        </div>
                        <button type="submit" class="btn btn-success w-100 btn-lg mb-3">Sign Up</button>
                    </form>
                    <div id="signupError" class="text-danger small text-center mb-3 d-none">Sign up failed.</div>
                    <div class="text-center">
                        <span class="text-muted">Already have an account?</span> <a href="{{ url_for('login') }}" class="text-success text-decoration-none fw-semibold">Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('userId', data.userId);
                    // Redirect new users directly to profile questionnaire
                    window.location.href = '{{ url_for("profile") }}';
                } else {
                    document.getElementById('signupError').textContent = data.error || 'Signup failed. Email might already exist.';
                    document.getElementById('signupError').classList.remove('d-none');
                }
            } catch (err) {
                console.error(err);
                document.getElementById('signupError').textContent = 'Cannot connect to server.';
                document.getElementById('signupError').classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
