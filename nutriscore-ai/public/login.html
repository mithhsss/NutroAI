<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NutriScore AI</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🍎 NutriScore AI</a>
        </div>
    </nav>

    <!-- Login Form Content -->
    <div class="container mt-5 pt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card border-0 shadow-sm rounded-4 p-4">
                    <h2 class="text-center mb-4 pt-2 fw-bold text-success">Welcome Back</h2>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="email" class="form-label text-muted fw-semibold">Email address</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label text-muted fw-semibold">Password</label>
                            <input type="password" class="form-control" id="password" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100 btn-lg mb-3">Login</button>
                    </form>
                    <div id="loginError" class="text-danger small text-center mb-3 d-none">Invalid credentials.</div>
                    <div class="text-center">
                        <span class="text-muted">Don't have an account?</span> <a href="signup.html" class="text-success text-decoration-none fw-semibold">Sign up</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('userId', data.userId);
                    
                    if (data.needsProfile) {
                        window.location.href = 'profile.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    document.getElementById('loginError').textContent = data.error || 'Login failed';
                    document.getElementById('loginError').classList.remove('d-none');
                }
            } catch (err) {
                console.error(err);
                document.getElementById('loginError').textContent = 'Cannot connect to server.';
                document.getElementById('loginError').classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
