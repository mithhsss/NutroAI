<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Profile - NutriScore AI</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .question-card {
            background: #fff;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
        <div class="container">
            <span class="navbar-brand fw-bold">🍎 NutriScore AI</span>
        </div>
    </nav>

    <div class="container mt-5 mb-5 pb-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-success">Personalize Your Profile</h2>
                    <p class="text-muted">Tell us about yourself to get accurate health scores and food recommendations.</p>
                </div>

                <form id="profileForm">
                    <div class="question-card">
                        <label class="form-label fw-bold">1. What is your age?</label>
                        <input type="number" id="age" class="form-control" required min="10" max="120">
                    </div>

                    <div class="question-card">
                        <label class="form-label fw-bold">2. What is your gender?</label>
                        <select id="gender" class="form-select" required>
                            <option value="">Select...</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="question-card">
                        <label class="form-label fw-bold">3. What is your height (in cm)?</label>
                        <input type="number" id="height" class="form-control" required min="50" max="300">
                    </div>

                    <div class="question-card">
                        <label class="form-label fw-bold">4. What is your weight (in kg)?</label>
                        <input type="number" id="weight" class="form-control" required min="20" max="300">
                    </div>

                    <div class="question-card">
                        <label class="form-label fw-bold">5. What is your diet preference?</label>
                        <select id="diet_preference" class="form-select" required>
                            <option value="">Select...</option>
                            <option value="Vegetarian">Vegetarian</option>
                            <option value="Non-Vegetarian">Non-Vegetarian</option>
                            <option value="Vegan">Vegan</option>
                        </select>
                    </div>

                    <div class="question-card">
                        <label class="form-label fw-bold">6. Do you have any food allergies?</label>
                        <input type="text" id="allergies" class="form-control" placeholder="e.g., Peanuts, Dairy (leave blank if none)">
                    </div>

                    <div class="question-card">
                        <label class="form-label fw-bold">7. What is your primary fitness goal?</label>
                        <select id="fitness_goal" class="form-select" required>
                            <option value="">Select...</option>
                            <option value="Weight Loss">Weight Loss</option>
                            <option value="Maintain Health">Maintain Health</option>
                            <option value="Muscle Gain">Muscle Gain</option>
                        </select>
                    </div>

                    <div class="question-card">
                        <label class="form-label fw-bold">8. What is your daily activity level?</label>
                        <select id="activity_level" class="form-select" required>
                            <option value="">Select...</option>
                            <option value="Low (Sedentary)">Low (Sedentary)</option>
                            <option value="Moderate (Active 3-5 days/week)">Moderate</option>
                            <option value="High (Very Active)">High (Very Active)</option>
                        </select>
                    </div>

                    <div class="question-card">
                        <label class="form-label fw-bold">9. How would you rate your sugar consumption?</label>
                        <select id="sugar_level" class="form-select" required>
                            <option value="">Select...</option>
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>

                    <div class="question-card">
                        <label class="form-label fw-bold">10. Average sleep hours per night?</label>
                        <input type="number" id="sleep_hours" class="form-control" required min="1" max="24">
                    </div>

                    <div class="question-card">
                        <label class="form-label fw-bold">11. Daily water intake (in Liters)?</label>
                        <input type="number" id="water_intake" class="form-control" required step="0.1" min="0.5" max="10">
                    </div>

                    <div class="question-card">
                        <label class="form-label fw-bold">12. Any medical conditions?</label>
                        <input type="text" id="medical_conditions" class="form-control" placeholder="e.g., Diabetes, Cholesterol (leave blank if none)">
                    </div>

                    <button type="submit" class="btn btn-success btn-lg w-100 shadow-sm mt-3">Complete Profile & Go to Dashboard</button>
                    <div id="profileError" class="text-danger small text-center mt-3 d-none">Failed to save profile. Please try again.</div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Check if user is logged in
        const userId = localStorage.getItem('userId');
        if (!userId) {
            window.location.href = '{{ url_for("login") }}';
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const profileData = {
                userId: userId,
                age: document.getElementById('age').value,
                gender: document.getElementById('gender').value,
                height: document.getElementById('height').value,
                weight: document.getElementById('weight').value,
                diet_preference: document.getElementById('diet_preference').value,
                allergies: document.getElementById('allergies').value,
                fitness_goal: document.getElementById('fitness_goal').value,
                activity_level: document.getElementById('activity_level').value,
                sugar_level: document.getElementById('sugar_level').value,
                sleep_hours: document.getElementById('sleep_hours').value,
                water_intake: document.getElementById('water_intake').value,
                medical_conditions: document.getElementById('medical_conditions').value
            };

            try {
                const res = await fetch('/api/profile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(profileData)
                });

                if (res.ok) {
                    window.location.href = '{{ url_for("dashboard") }}';
                } else {
                    const data = await res.json();
                    document.getElementById('profileError').textContent = data.error || 'Failed to save profile.';
                    document.getElementById('profileError').classList.remove('d-none');
                }
            } catch (err) {
                console.error(err);
                document.getElementById('profileError').classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
